# 1. Configuración General
site_name: Infraestructura de Red - Proyecto Enterprise
site_author: Grup A
site_description: Documentación técnica de despliegue de servidores corporativos

# 2. Configuración Estética (Tema Material)
theme:
  name: material
  language: es
  features:
    - navigation.tabs          # Menú horizontal superior
    - navigation.sections      # Secciones laterales organizadas
    - navigation.expand        # Expandir submenús automáticamente
    - navigation.top           # Botón de volver arriba
    - search.suggest           # Sugerencias en la búsqueda
    - content.code.copy        # Botón para copiar código
  palette: 
    # Modo claro/oscuro automático según el sistema
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro

# 3. Estructura de Navegación
nav:
  - Inicio: index.md
  - Administración de Servicios:
#    - Servidor Web: web_samu.md         # Asegúrate de crear este archivo
#    - Red (DHCP + DNS): red_alberto.md  # Asegúrate de crear este archivo
    - Almacenamiento (NAS): Nas_Jacob.md
#  - Ciberseguridad: 
#    - Hardening y Firewall: seguridad_blai.md

# 4. Extensiones de Markdown (Para que se vea mejor el contenido)
markdown_extensions:
  - admonition          # Cuadros de aviso (notas, peligros, etc.)
  - pymdownx.details    # Secciones desplegables
  - pymdownx.superfences # Bloques de código avanzados
  - tables              # Tablas mejoradas
  - attr_list           # Permite añadir estilos CSS directamente