site_name: Infraestructura de Red
site_author: Grup A
site_description: Documentación técnica de despliegue de servidores corporativos
site_dir: site
docs_dir: docs

theme:
  name: material
  language: es
  features:
    - navigation.tabs          
    - navigation.sections      
    - navigation.expand        
    - navigation.top           
    - search.suggest           
    - content.code.copy        
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro

nav:
  - Inicio: index.md
  - Administración de Servicios:
#    - Servidor Web: web_samu.md         # Asegúrate de crear este archivo
#    - Red (DHCP + DNS): red_alberto.md  # Asegúrate de crear este archivo
    - Almacenamiento (NAS): Nas_Jacob.md
#  - Ciberseguridad: 
#    - Hardening y Firewall: seguridad_blai.md

markdown_extensions:
  - admonition          
  - pymdownx.details    
  - pymdownx.superfences
  - tables              
  - attr_list           